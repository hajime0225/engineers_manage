version: '3.8'

services:
  # PHP (Laravel) アプリケーションサービス
  php:
    build:
      context: . # Dockerfileがあるディレクトリ
      dockerfile: Dockerfile
    container_name: laravel_app_php
    volumes:
      - ./src:/var/www/html # ローカルのsrcディレクトリをコンテナの/var/www/htmlにマウント
    depends_on:
      - db
    networks:
      - laravel_network

  # Webサーバー (Nginx) サービス
  nginx:
    image: nginx:latest
    container_name: laravel_app_nginx
    ports:
      - "8080:80" # ホストの8080番ポートをコンテナの80番ポートにマッピング (任意のポートに変更可能)
    volumes:
      - ./src:/var/www/html # PHPサービスと共有
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf # Nginx設定ファイルをマウント
    depends_on:
      - php
    networks:
      - laravel_network

  # MySQL データベースサービス
  db:
    image: mysql:8.0 # MySQLのバージョンを指定
    container_name: laravel_app_db
    ports:
      - "3306:3306" # ホストの33069番ポートをコンテナの3306番ポートにマッピング (デバッグ用、任意)
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_db}
      MYSQL_USER: ${DB_USERNAME:-laravel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-laravel_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - db_data:/var/lib/mysql # MySQLのデータを永続化
    networks:
      - laravel_network

# 名前付きボリュームの定義 (データの永続化用)
volumes:
  db_data:

# ネットワークの定義
networks:
  laravel_network:
    driver: bridge
